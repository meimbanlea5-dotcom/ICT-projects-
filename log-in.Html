<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RNHS-SHS Log In & Sign Up</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial, Helvetica, sans-serif;
    background: #e6ddff;
}

.header {
    background-color: #1f3c88;
    color: white;
    padding: 15px;
    text-align: center;
}

.container {
    width: 320px;
    background: white;
    padding: 20px;
    margin: 80px auto;
    border-radius: 8px;
}

.container h2 {
    text-align: center;
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 8px;
    margin: 8px 0;
}

button {
    width: 100%;
    padding: 8px;
    background-color: #1f3c88;
    color: white;
    border: none;
    cursor: pointer;
    margin-top: 5px;
}

p {
    text-align: center;
    font-size: 13px;
    margin-top: 10px;
}

span {
    color: #1f3c88;
    font-weight: bold;
    cursor: pointer;
}

.profile-link {
    text-align: center;
    margin-top: 15px;
}

.profile-link a {
    color: #1f3c88;
    font-weight: bold;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="header">
    <h1>RNHS – Senior High School</h1>
</div>

<div class="container">
    <h2 id="title">Log In</h2>

    <input type="text" placeholder="Username" required>
    <input type="password" placeholder="Password" required>

    <!-- Login button going to home page -->
    <a href="home.html">
        <button id="btn">Log In</button>
    </a>

    <p id="toggle">
        Don't have an account?
        <span onclick="toggleForm()">Sign Up</span>
    </p>

    <!-- Link to Web Developer Profile -->
    <div class="profile-link">
        Visit my Web Developer Profile:
        <a href="profile.html">Click Here</a>
    </div>
</div>

<script>
function toggleForm() {
    let title = document.getElementById("title");
    let btn = document.getElementById("btn");
    let toggle = document.getElementById("toggle");

    if (title.innerText === "Log In") {
        title.innerText = "Sign Up";
        btn.innerText = "Create Account";
        toggle.innerHTML = 'Already have an account? <span onclick="toggleForm()">Log In</span>';
    } else {
        title.innerText = "Log In";
        btn.innerText = "Log In";
        toggle.innerHTML = 'Don\'t have an account? <span onclick="toggleForm()">Sign Up</span>';
    }
}
</script>

</body>
</html>
